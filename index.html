<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DevDirector">
<title>DevDirector</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F4F2EE;color:#18150F;font-size:14px;line-height:1.5}
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:208px;min-width:208px;background:#1C3A28;display:flex;flex-direction:column;overflow-y:auto;transition:transform .25s}
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{background:#fff;border-bottom:1px solid #E5E1D9;padding:0 16px;height:52px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#ct{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.sbl{padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sbl h1{font-family:Georgia,serif;font-size:20px;color:#fff;font-weight:600}
.sbl p{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.sbsl{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.28);padding:11px 14px 5px}
.sbi{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;color:rgba(255,255,255,.55);font-size:12.5px;border-left:2px solid transparent}
.sbi.on{color:#fff;background:rgba(255,255,255,.09);border-left-color:#C09A5C}
.sbdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
hr.sbhr{border:none;border-top:1px solid rgba(255,255,255,.06);margin:5px 0}
.sbft{padding:14px;margin-top:auto}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:4px;border:1px solid transparent;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;background:#1C3A28;color:#fff}
.btn-gh{background:transparent;color:#5A5349;border-color:#E5E1D9}
.btn-gd{background:#C09A5C;color:#fff;border-color:#C09A5C;width:100%;justify-content:center}
.btn-rd{background:transparent;color:#B84A35;border-color:#E5E1D9}
.btn-sm{padding:5px 11px;font-size:11.5px}
.tbtl{font-family:Georgia,serif;font-size:18px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbmt{font-size:11px;color:#9B9590}
.tbr{display:flex;align-items:center;gap:7px;flex-shrink:0}
.card{background:#fff;border:1px solid #E5E1D9;border-radius:6px}
.ch{padding:13px 16px;border-bottom:1px solid #E5E1D9;display:flex;align-items:center;justify-content:space-between}
.cb{padding:16px}
.sc{background:#fff;border:1px solid #E5E1D9;border-radius:6px;padding:14px 16px}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#9B9590;margin-bottom:5px}
.sv{font-family:Georgia,serif;font-size:30px;font-weight:600;line-height:1}
.ss{font-size:11px;color:#9B9590;margin-top:3px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.mb14{margin-bottom:14px}
.mb18{margin-bottom:18px}
.mb20{margin-bottom:20px}
.pc{background:#fff;border:1px solid #E5E1D9;border-radius:6px;cursor:pointer;overflow:hidden}
.pca{height:3px}
.pcb{padding:14px 15px 15px}
.pct{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#9B9590;margin-bottom:4px}
.pcn{font-family:Georgia,serif;font-size:18px;font-weight:600;line-height:1.2;margin-bottom:3px}
.pcl{font-size:12px;color:#5A5349;margin-bottom:10px}
.pcs{display:flex;gap:12px;margin-bottom:10px}
.psv{font-size:13px;font-weight:600}
.psl{font-size:10px;color:#9B9590;text-transform:uppercase;letter-spacing:.07em}
.pcf{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.sb2{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:9.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
.pt{background:#E5E1D9;border-radius:2px;height:4px;overflow:hidden}
.pf{height:100%;border-radius:2px}
.tabs{display:flex;border-bottom:1px solid #E5E1D9;margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 13px;font-size:13px;font-weight:500;color:#9B9590;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.on{color:#1C3A28;border-bottom-color:#1C3A28}
.tbadge{font-size:9.5px;padding:1px 5px;border-radius:8px;margin-left:3px}
.mr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #E5E1D9}
.mr:last-child{border-bottom:none}
.mc{width:19px;height:19px;border-radius:50%;border:1.5px solid #CEC9BE;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.mc.dn{background:#2A7050;border-color:#2A7050;color:#fff}
.ml{flex:1;font-size:13px}
.ml.dn{color:#9B9590;text-decoration:line-through}
.md{font-size:11px;color:#9B9590}
.ni{padding:10px 12px;background:#F9F8F6;border-radius:4px;border-left:3px solid #C09A5C;margin-bottom:8px}
.nm{font-size:10px;color:#9B9590;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.nt{font-size:13px}
.ai{padding:10px 12px;background:#F9F8F6;border-radius:4px;display:flex;align-items:flex-start;gap:9px;margin-bottom:8px;border:1px solid #E5E1D9}
.ai.fd{opacity:.5}
.ac2{width:15px;height:15px;border-radius:3px;border:1.5px solid #CEC9BE;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px}
.ac2.dn{background:#1C3A28;border-color:#1C3A28;color:#fff}
.at{font-size:13px}
.at.dn{text-decoration:line-through;color:#9B9590}
.am{font-size:11px;color:#9B9590;margin-top:2px}
.pb{font-size:9.5px;padding:1px 6px;border-radius:10px;font-weight:600}
.pb-High{background:#F9E4DF;color:#B84A35}
.pb-Medium{background:#EBF1FA;color:#2B567F}
.pb-Low{background:#EAF5EF;color:#2A7050}
.chip{display:inline-flex;padding:2px 7px;border-radius:3px;font-size:11px;background:#F9F8F6;border:1px solid #E5E1D9;color:#5A5349}
.db{background:none;border:none;cursor:pointer;color:#9B9590;padding:2px 5px;font-size:15px;line-height:1;flex-shrink:0}
.stl{font-family:Georgia,serif;font-size:20px;font-weight:600;margin-bottom:2px}
.ssub{font-size:13px;color:#9B9590;margin-bottom:16px}
.bc{font-size:12px;color:#9B9590;margin-bottom:6px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.dtl{font-family:Georgia,serif;font-size:26px;font-weight:600;line-height:1.1;margin-bottom:4px}
.dsub{font-size:13px;color:#5A5349}
.es{text-align:center;padding:36px 16px}
.tl{display:flex;margin:12px 0 4px}
.tls{flex:1;text-align:center}
.tlb{height:5px;background:#E5E1D9;margin:0 2px;border-radius:1px}
.tlb.dn{background:#2A7050}
.tlb.ac{background:#C09A5C}
.tll{font-size:8px;color:#9B9590;text-transform:uppercase;letter-spacing:.06em;margin-top:5px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:#9B9590;font-weight:600;padding:7px 10px;text-align:left;border-bottom:1px solid #E5E1D9}
td{padding:9px 10px;border-bottom:1px solid #E5E1D9;font-size:13px}
tr:last-child td{border-bottom:none}
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;font-weight:600;color:#5A5349;margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em}
input[type=text],input[type=date],select,textarea{width:100%;padding:8px 10px;border:1px solid #E5E1D9;border-radius:4px;font-size:14px;font-family:inherit;color:#18150F;background:#fff;outline:none;-webkit-appearance:none;appearance:none}
input[type=text]:focus,input[type=date]:focus,select:focus,textarea:focus{border-color:#1C3A28}
textarea{min-height:80px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fh{font-size:12px;color:#9B9590;padding:7px 10px;background:#F9F8F6;border-radius:4px;margin-top:4px}
.ov{position:fixed;inset:0;background:rgba(18,15,10,.44);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.md2{background:#fff;border-radius:12px 12px 0 0;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mh{padding:16px 18px;border-bottom:1px solid #E5E1D9;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mt{font-family:Georgia,serif;font-size:20px;font-weight:600}
.mb2{padding:18px}
.mf{padding:12px 18px;border-top:1px solid #E5E1D9;display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#E5E1D9;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#1C3A28;cursor:pointer}
#ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}
#ovl.show{display:block}
.hm{background:none;border:1px solid #E5E1D9;border-radius:4px;padding:6px 8px;cursor:pointer;color:#5A5349;display:none;align-items:center;justify-content:center}
@media(max-width:640px){
  #sb{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.2)}
  #sb.open{transform:translateX(0)}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:1fr}
  .g2{grid-template-columns:1fr}
  .fr{grid-template-columns:1fr}
  .hm{display:flex}
  .hmx{display:none}
}
</style>
</head>
<body>
<div id="ovl" onclick="closeSB()"></div>
<div id="app">
  <div id="sb">
    <div class="sbl"><h1>DevDirector</h1><p>Portfolio Command</p></div>
    <div id="sbnav"></div>
    <div class="sbft"><button class="btn btn-gd" onclick="openMod('proj')">+ New Project</button></div>
  </div>
  <div id="mn">
    <div id="tb">
      <button class="hm" onclick="toggleSB()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div style="flex:1;min-width:0">
        <div class="tbtl" id="tbtl">Dashboard</div>
        <div class="tbmt" id="tbmt"></div>
      </div>
      <div class="tbr" id="tbr"></div>
    </div>
    <div id="ct"></div>
  </div>
</div>
<div class="ov" id="mod-proj"><div class="md2" id="mod-proj-i"></div></div>
<div class="ov" id="mod-note"><div class="md2" id="mod-note-i"></div></div>
<div class="ov" id="mod-act"><div class="md2" id="mod-act-i"></div></div>
<div class="ov" id="mod-ms"><div class="md2" id="mod-ms-i"></div></div>
<script>
var STAGES = [
  {id:"feasibility",label:"Feasibility & Acquisition",color:"#C09A5C",short:"FEASIBILITY"},
  {id:"planning",label:"Planning & Design",color:"#6E9EC8",short:"PLANNING"},
  {id:"construction",label:"Construction",color:"#7EC8A9",short:"CONSTRUCTION"},
  {id:"sales",label:"Sales & Leasing / Exit",color:"#C87E9E",short:"SALES & EXIT"}
];
var PTYPES = ["Residential","Commercial / Mixed-Use","Consulting","Personal Development"];
var MSTPL = {
  feasibility:["Site Identified","Initial Feasibility Complete","Due Diligence Started","Due Diligence Complete","Heads of Terms Agreed","Contracts Exchanged","Acquisition Complete"],
  planning:["Consultant Team Appointed","Concept Design Complete","Pre-App Submitted","Planning Application Submitted","Planning Approved","Reserved Matters Submitted","Reserved Matters Approved"],
  construction:["Tender Issued","Contractor Appointed","Enabling Works","Groundworks Complete","Superstructure Complete","Roof On / Watertight","Fit-Out Complete","Practical Completion"],
  sales:["Sales Strategy Agreed","Marketing Launched","First Sale Agreed","50% Sold","Fully Sold / Leased","Practical Completion","Final Account Agreed","Project Closed"]
};
var PRIO = ["High","Medium","Low"];
var DPROJECTS = [
  {id:"p1",name:"Riverside Quarter",type:"Residential",location:"Bristol, BS1",stage:"construction",value:"42m GDV",units:"186 units",progress:62,startDate:"2023-03-01",targetDate:"2025-09-30",description:"Mixed tenure residential development on former industrial waterfront site.",
   milestones:[{id:"m1",label:"Site Identified",done:true,date:"2023-03-01"},{id:"m2",label:"Acquisition Complete",done:true,date:"2023-07-14"},{id:"m3",label:"Planning Approved",done:true,date:"2024-02-22"},{id:"m4",label:"Contractor Appointed",done:true,date:"2024-05-01"},{id:"m5",label:"Superstructure Complete",done:false,date:"2025-03-31"},{id:"m6",label:"Practical Completion",done:false,date:"2025-09-30"}],
   notes:[{id:"n1",text:"Site visit: structural steel 2 weeks ahead. Contractor confident on PC date.",date:"2025-02-14"}],
   actions:[{id:"a1",text:"Chase M&E sub-contractor programme update",priority:"High",dueDate:"2025-03-20",assignee:"Self",done:false}]},
  {id:"p2",name:"Forum Exchange",type:"Commercial / Mixed-Use",location:"Leeds, LS1",stage:"planning",value:"78m GDV",units:"220,000 sqft",progress:35,startDate:"2024-01-10",targetDate:"2026-12-31",description:"Grade-A office and retail mixed-use scheme in city centre regeneration zone.",
   milestones:[{id:"m1",label:"Site Identified",done:true,date:"2024-01-10"},{id:"m2",label:"Acquisition Complete",done:true,date:"2024-04-30"},{id:"m3",label:"Concept Design Complete",done:true,date:"2024-09-15"},{id:"m4",label:"Pre-App Submitted",done:false,date:"2025-02-28"},{id:"m5",label:"Planning Application Submitted",done:false,date:"2025-06-30"},{id:"m6",label:"Planning Approved",done:false,date:"2026-01-31"}],
   notes:[],actions:[{id:"a2",text:"Confirm pre-app meeting date with LPA",priority:"High",dueDate:"2025-03-15",assignee:"Self",done:false}]},
  {id:"p3",name:"Meridian Advisory",type:"Consulting",location:"Remote / Birmingham",stage:"feasibility",value:"Fee: 85k",units:"Advisory",progress:20,startDate:"2025-01-15",targetDate:"2025-07-31",description:"Development appraisal and planning strategy for private client brownfield site.",
   milestones:[{id:"m1",label:"Brief Agreed",done:true,date:"2025-01-15"},{id:"m2",label:"Initial Feasibility Complete",done:false,date:"2025-03-15"},{id:"m3",label:"Report Delivered",done:false,date:"2025-07-31"}],
   notes:[],actions:[]}
];

var STORE = “dd_v3”;
var projects = [];
var ST = {view:“dashboard”,sel:null,tab:“milestones”,tf:“all”,af:“open”};

function loadData() {
try {
var r = localStorage.getItem(STORE);
if (r) { projects = JSON.parse(r); return; }
} catch(e) {}
projects = JSON.parse(JSON.stringify(DPROJECTS));
}
function saveData() {
try { localStorage.setItem(STORE, JSON.stringify(projects)); } catch(e) {}
}
function uid() { return Math.random().toString(36).slice(2,9); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtD(d) {
if (!d) return “-”;
var dt = new Date(d + “T12:00:00”);
var months = [“Jan”,“Feb”,“Mar”,“Apr”,“May”,“Jun”,“Jul”,“Aug”,“Sep”,“Oct”,“Nov”,“Dec”];
return dt.getDate() + “ “ + months[dt.getMonth()] + “ “ + dt.getFullYear();
}
function dLeft(d) {
if (!d) return null;
return Math.round((new Date(d + “T12:00:00”) - new Date()) / 86400000);
}
function stg(id) {
for (var i = 0; i < STAGES.length; i++) { if (STAGES[i].id === id) return STAGES[i]; }
return STAGES[0];
}
function esc(s) {
return String(s).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”);
}
function h(tag, attrs, content) {
var a = “”;
for (var k in attrs) { a += “ “ + k + ‘=”’ + attrs[k] + ‘”’; }
return “<” + tag + a + “>” + (content || “”) + “</” + tag + “>”;
}

function renderSB() {
var groups = [
{label:“Development”,types:[“Residential”,“Commercial / Mixed-Use”]},
{label:“Consulting”,types:[“Consulting”]},
{label:“Personal”,types:[“Personal Development”]}
];
var out = ‘<div style="padding-top:4px">’;
out += ‘<div class="sbsl">Navigation</div>’;
var navs = [[“dashboard”,“Dashboard”],[“projects”,“All Projects”],[“actions”,“Actions”]];
for (var i = 0; i < navs.length; i++) {
var id = navs[i][0], lbl = navs[i][1];
var on = (ST.view === id || (ST.view === “detail” && id === “projects”)) ? “ on” : “”;
out += ‘<div class="sbi' + on + '" onclick="nav(\'' + id + '\')">’ + esc(lbl) + ‘</div>’;
}
out += ‘</div><hr class="sbhr">’;
for (var g = 0; g < groups.length; g++) {
var grp = groups[g];
var gps = [];
for (var p = 0; p < projects.length; p++) {
for (var t = 0; t < grp.types.length; t++) {
if (projects[p].type === grp.types[t]) { gps.push(projects[p]); break; }
}
}
if (!gps.length) continue;
out += ‘<div class="sbsl">’ + esc(grp.label) + ‘</div>’;
for (var j = 0; j < gps.length; j++) {
var pr = gps[j];
var s = stg(pr.stage);
var on2 = ST.sel === pr.id ? “ on” : “”;
out += ‘<div class="sbi' + on2 + '" onclick="viewProj(\'' + pr.id + '\')">’;
out += ‘<div class="sbdot" style="background:' + s.color + '"></div>’;
out += ‘<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">’ + esc(pr.name) + ‘</span>’;
out += ‘</div>’;
}
}
document.getElementById(“sbnav”).innerHTML = out;
}

function renderTB() {
var sel = null;
for (var i = 0; i < projects.length; i++) { if (projects[i].id === ST.sel) { sel = projects[i]; break; } }
var titles = {dashboard:“Dashboard”,projects:“Projects”,actions:“All Actions”,detail: sel ? sel.name : “Project”};
var allAct = [];
for (var i = 0; i < projects.length; i++) { allAct = allAct.concat(projects[i].actions); }
var openAct = 0; for (var i = 0; i < allAct.length; i++) { if (!allAct[i].done) openAct++; }
var metas = {
dashboard: projects.length + “ projects - “ + openAct + “ open actions”,
projects: filtered().length + “ projects”,
actions: “”,
detail: sel ? sel.type + “ - “ + sel.location : “”
};
document.getElementById(“tbtl”).textContent = titles[ST.view] || “”;
document.getElementById(“tbmt”).textContent = metas[ST.view] || “”;
var right = ‘<button class="btn btn-sm" onclick="openMod(\'proj\')">+ New</button>’;
if (ST.view === “detail” && sel) {
right = ‘<button class="btn btn-rd btn-sm" onclick="delProj(\'' + sel.id + '\')">Delete</button>’ + right;
}
document.getElementById(“tbr”).innerHTML = right;
}

function filtered() {
if (ST.tf === “all”) return projects;
var out = [];
for (var i = 0; i < projects.length; i++) { if (projects[i].type === ST.tf) out.push(projects[i]); }
return out;
}

function render() {
renderSB();
renderTB();
var c = document.getElementById(“ct”);
if (ST.view === “dashboard”) c.innerHTML = renderDash();
else if (ST.view === “projects”) c.innerHTML = renderProjs();
else if (ST.view === “detail”) c.innerHTML = renderDetail();
else if (ST.view === “actions”) c.innerHTML = renderActs();
}

function renderDash() {
var allAct = [];
for (var i = 0; i < projects.length; i++) { allAct = allAct.concat(projects[i].actions); }
var openAct = 0, overdueAct = 0;
for (var i = 0; i < allAct.length; i++) {
if (!allAct[i].done) { openAct++; var d = dLeft(allAct[i].dueDate); if (d !== null && d < 0) overdueAct++; }
}
var upcoming = [];
for (var i = 0; i < projects.length; i++) {
for (var j = 0; j < projects[i].milestones.length; j++) {
var m = projects[i].milestones[j];
if (!m.done && m.date) upcoming.push({label:m.label,date:m.date,pName:projects[i].name,pId:projects[i].id});
}
}
upcoming.sort(function(a,b){ return new Date(a.date) - new Date(b.date); });
if (upcoming.length > 6) upcoming = upcoming.slice(0,6);
var inConst = 0, inPlan = 0;
for (var i = 0; i < projects.length; i++) {
if (projects[i].stage === “construction”) inConst++;
if (projects[i].stage === “planning”) inPlan++;
}
var dateStr = new Date().toLocaleDateString(“en-GB”,{weekday:“long”,day:“numeric”,month:“long”,year:“numeric”});
var out = ‘’;
out += ‘<div class="mb20"><div class="stl">Good morning</div>’;
out += ‘<div class="ssub">’ + dateStr + ‘</div></div>’;
out += ‘<div class="g4 mb18">’;
out += ‘<div class="sc"><div class="sl">Projects</div><div class="sv">’ + projects.length + ‘</div></div>’;
out += ‘<div class="sc"><div class="sl">Construction</div><div class="sv">’ + inConst + ‘</div></div>’;
out += ‘<div class="sc"><div class="sl">Open Actions</div><div class=“sv” style=“color:’ + (overdueAct > 0 ? “#B84A35” : “#18150F”) + ‘”>’ + openAct + ‘</div><div class="ss">’ + (overdueAct > 0 ? overdueAct + “ overdue” : “on track”) + ‘</div></div>’;

function renderActs() {

else if (ST.af === “all”) fil.push(all[i]);

return ‘<div class="mh"><div class="mt">Add Note</div><button class="btn btn-gh btn-sm" onclick="closeMod(\'note\')">✕</button></div>’ +
‘<div class="mb2"><div class="fg"><label class="fl">Note</label><textarea id="nf-text" style="min-height:100px" placeholder="Capture an idea or update..."></textarea></div></div>’ +
‘<div class="mf"><button class="btn btn-gh btn-sm" onclick="closeMod(\'note\')">Cancel</button><button class="btn btn-sm" onclick="subNote()">Save Note</button></div>’;
}
if (type === “act”) {
var popts = “”;
for (var i = 0; i < PRIO.length; i++) { popts += ‘<option>’ + PRIO[i] + ‘</option>’; }
return ‘<div class="mh"><div class="mt">Add Action</div><button class="btn btn-gh btn-sm" onclick="closeMod(\'act\')">✕</button></div>’ +
‘<div class="mb2"><div class="fg"><label class="fl">Action *</label><input type="text" id="af-text" placeholder="What needs to happen?"></div>’ +
‘<div class="fr"><div class="fg"><label class="fl">Due Date</label><input type="date" id="af-due"></div>’ +
‘<div class="fg"><label class="fl">Priority</label><select id="af-pri">’ + popts + ‘</select></div></div>’ +
‘<div class="fg"><label class="fl">Assignee</label><input type="text" id="af-who" placeholder="Name or team"></div></div>’ +
‘<div class="mf"><button class="btn btn-gh btn-sm" onclick="closeMod(\'act\')">Cancel</button><button class="btn btn-sm" onclick="subAct()">Add Action</button></div>’;
}
if (type === “ms”) {
return ‘<div class="mh"><div class="mt">Add Milestone</div><button class="btn btn-gh btn-sm" onclick="closeMod(\'ms\')">✕</button></div>’ +
‘<div class="mb2"><div class="fg"><label class="fl">Milestone *</label><input type="text" id="mf-lbl" placeholder="e.g. Planning Approved"></div>’ +
‘<div class="fg"><label class="fl">Target Date</label><input type="date" id="mf-date"></div></div>’ +
‘<div class="mf"><button class="btn btn-gh btn-sm" onclick="closeMod(\'ms\')">Cancel</button><button class="btn btn-sm" onclick="subMs()">Add</button></div>’;
}
return “”;
}

function openMod(t) {
var el = document.getElementById(“mod-” + t + “-i”);
if (el) el.innerHTML = getModHTML(t);
var ov = document.getElementById(“mod-” + t);
if (ov) { ov.classList.add(“show”); setTimeout(function(){ var f = el.querySelector(“input[type=text],textarea”); if(f) f.focus(); }, 250); }
}
function closeMod(t) { var ov = document.getElementById(“mod-” + t); if (ov) ov.classList.remove(“show”); }

function subProj() {
var name = document.getElementById(“pf-name”).value.trim();
if (!name) return;
var stage = document.getElementById(“pf-stage”).value;
var tpl = MSTPL[stage] || [];
var ms = [];
for (var i = 0; i < tpl.length; i++) { ms.push({id:uid(),label:tpl[i],done:false,date:””}); }
projects.push({
id:uid(),name:name,
type:document.getElementById(“pf-type”).value,
location:document.getElementById(“pf-loc”).value.trim(),
stage:stage,
value:document.getElementById(“pf-val”).value.trim(),
units:document.getElementById(“pf-units”).value.trim(),
startDate:document.getElementById(“pf-start”).value,
targetDate:document.getElementById(“pf-target”).value,
description:document.getElementById(“pf-desc”).value.trim(),
progress:0,milestones:ms,notes:[],actions:[]
});
saveData(); closeMod(“proj”); render();
}
function subNote() {
var text = document.getElementById(“nf-text”).value.trim();
if (!text || !ST.sel) return;
for (var i = 0; i < projects.length; i++) {
if (projects[i].id === ST.sel) { projects[i].notes.unshift({id:uid(),text:text,date:today()}); break; }
}
saveData(); closeMod(“note”); render();
}
function subAct() {
var text = document.getElementById(“af-text”).value.trim();
if (!text || !ST.sel) return;
for (var i = 0; i < projects.length; i++) {
if (projects[i].id === ST.sel) {
projects[i].actions.push({id:uid(),text:text,priority:document.getElementById(“af-pri”).value,dueDate:document.getElementById(“af-due”).value,assignee:document.getElementById(“af-who”).value.trim(),done:false});
break;
}
}
saveData(); closeMod(“act”); render();
}
function subMs() {
var lbl = document.getElementById(“mf-lbl”).value.trim();
if (!lbl || !ST.sel) return;
for (var i = 0; i < projects.length; i++) {
if (projects[i].id === ST.sel) { projects[i].milestones.push({id:uid(),label:lbl,date:document.getElementById(“mf-date”).value,done:false}); break; }
}
saveData(); closeMod(“ms”); render();
}

function nav(v) { ST.view = v; if (v !== “detail”) ST.sel = null; closeSB(); render(); }
function viewProj(id) { ST.sel = id; ST.view = “detail”; ST.tab = “milestones”; closeSB(); render(); }
function setTab(t) { ST.tab = t; render(); }
function setAF(v) { ST.af = v; render(); }
function delProj(id) {
if (!confirm(“Delete this project?”)) return;
var np = [];
for (var i = 0; i < projects.length; i++) { if (projects[i].id !== id) np.push(projects[i]); }
projects = np; saveData(); nav(“projects”);
}
function togMs(pid, mid) {
for (var i = 0; i < projects.length; i++) {
if (projects[i].id === pid) {
for (var j = 0; j < projects[i].milestones.length; j++) {
if (projects[i].milestones[j].id === mid) { projects[i].milestones[j].done = !projects[i].milestones[j].done; break; }
}
break;
}
}
saveData(); render();
}
function togAct(pid, aid) {
for (var i = 0; i < projects.length; i++) {
if (projects[i].id === pid) {
for (var j = 0; j < projects[i].actions.length; j++) {
if (projects[i].actions[j].id === aid) { projects[i].actions[j].done = !projects[i].actions[j].done; break; }
}
break;
}
}
saveData(); render();
}
function togActG(pid, aid) { togAct(pid, aid); }
function delNote(pid, nid) {
for (var i = 0; i < projects.length; i++) {
if (projects[i].id === pid) {
var nn = [];
for (var j = 0; j < projects[i].notes.length; j++) { if (projects[i].notes[j].id !== nid) nn.push(projects[i].notes[j]); }
projects[i].notes = nn; break;
}
}
saveData(); render();
}
function delAct(pid, aid) {
for (var i = 0; i < projects.length; i++) {
if (projects[i].id === pid) {
var na = [];
for (var j = 0; j < projects[i].actions.length; j++) { if (projects[i].actions[j].id !== aid) na.push(projects[i].actions[j]); }
projects[i].actions = na; break;
}
}
saveData(); render();
}
function delMs(pid, mid) {
for (var i = 0; i < projects.length; i++) {
if (projects[i].id === pid) {
var nm = [];
for (var j = 0; j < projects[i].milestones.length; j++) { if (projects[i].milestones[j].id !== mid) nm.push(projects[i].milestones[j]); }
projects[i].milestones = nm; break;
}
}
saveData(); render();
}
function updProg(pid, val) {
for (var i = 0; i < projects.length; i++) { if (projects[i].id === pid) { projects[i].progress = parseInt(val); break; } }
saveData(); render();
}
function updStage(pid, val) {
for (var i = 0; i < projects.length; i++) { if (projects[i].id === pid) { projects[i].stage = val; break; } }
saveData(); render();
}
function toggleSB() { document.getElementById(“sb”).classList.toggle(“open”); document.getElementById(“ovl”).classList.toggle(“show”); }
function closeSB() { document.getElementById(“sb”).classList.remove(“open”); document.getElementById(“ovl”).classList.remove(“show”); }

loadData();
render();
</script>

</body>
</html>
